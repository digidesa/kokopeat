<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokopeat - Linktree</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #e2eccb;
            --bg-bottom: #55803c;
            --text-dark: #203f19;
            --tiktok-bg: #141414;
            --shopee-bg: #ea501f;
            --tokopedia-bg: #03a055;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
            padding: 40px 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        /* Bagian Header / Logo */
        .header-section {
            margin-bottom: 40px;
        }

        .logo-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: var(--text-dark);
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .divider::before, .divider::after {
            content: "";
            width: 50px;
            height: 1px;
            background-color: var(--text-dark);
            opacity: 0.5;
        }

        .divider-dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-dark);
            border-radius: 50%;
            opacity: 0.7;
        }

        /* Bagian Tombol Link */
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .link-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.25);
        }

        .link-card.tiktok {
            background: linear-gradient(135deg, #222 0%, var(--tiktok-bg) 100%);
        }

        .link-card.shopee {
            background: linear-gradient(135deg, #ff6633 0%, var(--shopee-bg) 100%);
        }

        .link-card.tokopedia {
            background: linear-gradient(135deg, #42b549 0%, var(--tokopedia-bg) 100%);
        }

        .icon-wrapper {
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 12px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .tiktok .icon-wrapper svg {
            width: 24px;
            fill: black;
        }

        .shopee .icon-wrapper svg {
            width: 24px;
            fill: var(--shopee-bg);
        }

        .tokopedia .icon-wrapper svg {
            width: 24px;
            fill: var(--tokopedia-bg);
        }

        .text-wrapper {
            flex-grow: 1;
            text-align: left;
        }

        .link-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .link-subtitle {
            font-size: 0.8rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .arrow-wrapper {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .arrow-wrapper svg {
            width: 14px;
            fill: white;
        }

        /* Bagian Footer */
        .footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.8;
        }

        .footer-icon {
            width: 40px;
            height: 40px;
            background-color: #d1dfb8;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .footer-icon svg {
            width: 20px;
            fill: var(--text-dark);
        }
    </style>
</head>
